<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thompson Watch | Premium Courses</title>
    <meta name="description" content="Explore our curated selection of premium watches and watchmaking courses.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">
                <span class="logo-text">THOMPSON</span>
                <span class="logo-subtext">WATCH</span>
            </div>
            <div class="nav-links">
                <a href="#courses" class="active">Courses</a>
                <a href="analysis.html">Analysis</a>
                <a href="#">Contact</a>
            </div>
        </nav>
    </header>

    <main>


        <section id="courses" class="courses-section">
            <div class="container">
                <div class="section-header" style="margin-top: 5rem;">
                    <h1>Available Courses</h1>
                    <div class="search-container" style="margin-top: 2rem;">
                        <input type="text" id="course-search" placeholder="Search courses by name or description..." style="width: 100%; max-width: 500px; padding: 1rem 1.5rem; border-radius: 30px; border: 1px solid rgba(212, 175, 55, 0.3); background: rgba(22, 22, 26, 0.8); color: white; font-size: 1rem; outline: none; transition: all 0.3s ease;">
                    </div>
                </div>
                <div id="courses-grid" class="courses-grid">
                    <!-- Courses will be injected here by JavaScript -->
                    <div class="loader">Loading courses...</div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-logo">
                <span class="logo-text">THOMPSON</span>
                <span class="logo-subtext">WATCH</span>
            </div>
            <p>&copy; 2026 Thompson Watch. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
